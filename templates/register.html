<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Blueprint Compiler</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        :root {
            --app-panel: #1a1f29;
            --app-line: #00ffd0;
            --app-text: #e1e7f0;
            --bg-color: #0d1117;
        }
        body {
            background-color: var(--bg-color);
            color: var(--app-text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .register-panel {
            background-color: var(--app-panel);
            border: 1px solid var(--app-line);
            padding: 40px;
            border-radius: 8px;
            width: 350px;
            box-shadow: 0 4px 15px rgba(0, 255, 208, 0.1);
        }
        h2 {
            margin-top: 0;
            color: var(--app-line);
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
        }
        input {
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #2d3748;
            background-color: #10141d;
            color: var(--app-text);
            box-sizing: border-box;
        }
        input:focus {
            border-color: var(--app-line);
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            border-radius: 4px;
            border: none;
            background-color: var(--app-line);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #00cca3;
        }
        .flash-messages {
            background-color: #742a2a;
            color: #fff;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 0.9em;
        }
        .footer-link {
            text-align: center;
            margin-top: 15px;
            font-size: 0.85em;
        }
        a {
            color: var(--app-line);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="register-panel">
        <h2>CREATE ACCOUNT</h2>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="flash-messages">
              {% for message in messages %}
                <div>{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form action="/register" method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit">REGISTER</button>
        </form>
        <div class="footer-link">
            Already have an account? <a href="/login">Sign in here</a>
        </div>
    </div>
</body>
</html>
